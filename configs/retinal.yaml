# ------ root_path/dataset_name ------
# Data will be downloaded from HuggingFace automatically
root_path: './data'


# ------ Load Cache and Features ------
load_cache: False
load_pre_feat: False

# After first run, set these to True for faster loading:
# load_cache: True
# load_pre_feat: True


# ------ Hyperparamters ------
search_hp: True
# search_hp: False

search_scale: [12, 5]
search_step: [200, 20]

init_beta: 1
init_alpha: 3


# ------ Basic Config ------
dataset: 'retinal'
shots: 8  # 8-shot
backbone: 'ViT-B/16'  # or 'RN50', 'ViT-B/32'

lr: 0.001
augment_epoch: 10
train_epoch: 20
