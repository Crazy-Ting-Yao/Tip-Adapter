# Tip-Adapter with LLaVA v1.6 Mistral 7B backbone
# Requires: pip install 'transformers>=4.42' accelerate
root_path: './data'

load_cache: False
load_pre_feat: False

search_hp: True
search_scale: [12, 5]
search_step: [200, 20]

init_beta: 1
init_alpha: 3

dataset: 'pokemon'
shots: 1
backbone: 'llava-hf/llava-v1.6-mistral-7b-hf'

lr: 0.001
augment_epoch: 10
train_epoch: 20
